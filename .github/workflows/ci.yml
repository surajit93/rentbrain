
name: ci
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile
        run: python -m compileall engines scripts
      - name: Run pipeline
        run: python scripts/run_pipeline.py
